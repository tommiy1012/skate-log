<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛹 滑板学习记录表 - 碗池 & 街市动作</title>
    <!-- ===== 引入 D3.js 力导向图库 ===== -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* ========== 所有原有样式保持不变 ========== */
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-secondary: #6b5e4a;
            --accent: #e8753c;
            --accent2: #e8a040;
            --street: #5b7bb5;
            --street-light: #e8eff8;
            --street-dark: #3d5a8c;
            --bowl: #4a9c7c;
            --bowl-light: #e6f5ef;
            --bowl-dark: #2d7a5f;
            --star: #f0b429;
            --danger: #d64545;
            --success: #3d9c6e;
            --border: #e8e0d5;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 16px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(232, 160, 64, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(74, 156, 124, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(91, 123, 181, 0.03) 0%, transparent 70%);
        }
        .app-header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }
        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .app-logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            text-decoration: none;
        }
        .app-logo .icon {
            font-size: 1.8rem;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-3px);
            }
            85% {
                transform: translateY(0);
            }
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn {
            padding: 9px 18px;
            border-radius: 50px;
            border: 1.5px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            font-family: var(--font);
            letter-spacing: 0.01em;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-sm {
            padding: 6px 13px;
            font-size: 0.82rem;
            border-radius: 50px;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 50px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(232, 117, 60, 0.25);
        }
        .btn-primary:hover {
            background: #d46935;
            border-color: #d46935;
            box-shadow: 0 4px 14px rgba(232, 117, 60, 0.35);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(232, 117, 60, 0.2);
        }
        .btn-outline {
            background: transparent;
            border-color: var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: #faf7f3;
            border-color: #d5c9b5;
            color: var(--text);
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text-secondary);
            padding: 8px 10px;
        }
        .btn-ghost:hover {
            background: #f5f0eb;
            color: var(--text);
        }
        .btn-danger {
            background: #fff;
            border-color: #fcc;
            color: var(--danger);
        }
        .btn-danger:hover {
            background: #fff5f5;
            border-color: #faa;
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }
        .btn-success:hover {
            background: #348b5f;
        }
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 20px;
        }
        .tab-nav {
            display: flex;
            gap: 4px;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 5px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            flex: 1;
            min-width: 90px;
            padding: 11px 18px;
            border: none;
            background: transparent;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            font-family: var(--font);
            color: var(--text-secondary);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }
        .tab-btn.active {
            background: #fff;
            color: var(--text);
            box-shadow: var(--shadow-sm);
            font-weight: 700;
        }
        .tab-btn:hover:not(.active) {
            color: var(--text);
            background: rgba(255, 255, 255, 0.5);
        }
        .tab-content {
            display: none;
            animation: fadeSlideIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }
        .section-title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-bowl {
            background: var(--bowl);
        }
        .dot-street {
            background: var(--street);
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            box-shadow: var(--shadow);
            border-color: #e8e0d5;
            transform: translateY(-1px);
        }
        .card:active {
            transform: scale(0.985);
            transition: 0.1s ease;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card-title {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .difficulty-stars {
            color: var(--star);
            font-size: 0.85rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .difficulty-stars .empty {
            color: #ddd;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .badge-bowl {
            background: var(--bowl-light);
            color: var(--bowl-dark);
        }
        .badge-street {
            background: var(--street-light);
            color: var(--street-dark);
        }
        .badge-status {
            font-size: 0.7rem;
            padding: 3px 9px;
        }
        .badge-new {
            background: #fef3e0;
            color: #b8781a;
        }
        .badge-practice {
            background: #e8f0fe;
            color: #3d6db5;
        }
        .badge-mastered {
            background: #e6f5ef;
            color: #2d7a5f;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.show {
            display: flex !important;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--card-bg);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 700px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 24px 20px 30px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            position: relative;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #d5c9b5;
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f5f0eb;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 5;
        }
        .modal-close:hover {
            background: #e8e0d5;
        }
        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }
        .modal .meta-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }
        .modal .section-label {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin: 16px 0 6px;
        }
        .要领-text {
            background: #faf7f3;
            border-radius: var(--radius-sm);
            padding: 16px;
            line-height: 1.7;
            font-size: 0.95rem;
            min-height: 60px;
            outline: none;
            transition: var(--transition);
        }
        .要领-text:focus {
            box-shadow: 0 0 0 3px rgba(232, 117, 60, 0.15);
            background: #fff;
        }
        .要领-text img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 8px 0;
            display: block;
        }
        .要领-text .rich-toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 6px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .要领-text .rich-toolbar .btn {
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #1a1a1a;
            margin-top: 8px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-placeholder {
            background: #faf7f3;
            border-radius: var(--radius-sm);
            padding: 30px 20px;
            text-align: center;
            color: var(--text-secondary);
            border: 2px dashed #e8e0d5;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .input {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            font-family: var(--font);
            background: #fdfbf8;
            transition: var(--transition);
            outline: none;
        }
        .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 117, 60, 0.08);
            background: #fff;
        }
        textarea.input {
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 60px;
        }
        .log-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid transparent;
            transition: var(--transition);
        }
        .log-item.bowl-log {
            border-left-color: var(--bowl);
        }
        .log-item.street-log {
            border-left-color: var(--street);
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }
        .log-date {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
        }
        .log-trick {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .log-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .log-detail {
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .log-detail strong {
            color: var(--text);
        }
        .log-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500;
        }
        .progress-bar-wrap {
            background: #f0ebe0;
            border-radius: 50px;
            height: 8px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 0.5s ease;
        }
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            align-items: center;
        }
        .filter-row select,
        .filter-row input {
            padding: 8px 14px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-size: 0.85rem;
            font-family: var(--font);
            background: #fdfbf8;
            outline: none;
            transition: var(--transition);
        }
        .filter-row select:focus,
        .filter-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 117, 60, 0.06);
        }
        .graph-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            min-height: 500px;
            position: relative;
            width: 100%;
        }
        .graph-container svg {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 500px;
            background: #fafcff;
            border-radius: var(--radius-sm);
            cursor: grab;
        }
        .graph-container svg:active {
            cursor: grabbing;
        }
        /* D3 节点样式 */
        .graph-node-group {
            cursor: pointer;
        }
        .graph-node-group circle {
            transition: filter 0.2s;
        }
        .graph-node-group:hover circle {
            filter: brightness(0.85) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.25));
        }
        .graph-node-group text {
            font-size: 11px;
            font-weight: 600;
            fill: #fff;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .graph-edge {
            stroke: #94a3b8;
            stroke-width: 2.5;
            fill: none;
            transition: stroke 0.2s;
        }
        .graph-edge:hover {
            stroke: #e8753c;
            stroke-width: 3;
        }
        .graph-label {
            font-size: 13px;
            fill: var(--text-secondary);
            font-weight: 600;
        }
        .graph-legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 12px 0 4px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .graph-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .graph-legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        .graph-legend-dot.lv1 {
            background: #f59e0b;
        }
        .graph-legend-dot.lv2 {
            background: #3b82f6;
        }
        .graph-legend-dot.lv3 {
            background: #ef4444;
        }
        .doc-section {
            margin-top: 14px;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }
        .doc-section .section-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .doc-content {
            background: #faf7f3;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            line-height: 1.7;
            font-size: 0.92rem;
            white-space: pre-line;
            min-height: 50px;
        }
        .doc-content.empty {
            color: var(--text-secondary);
            font-style: italic;
        }
        .doc-edit-area {
            margin-top: 8px;
        }
        .doc-edit-area textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 0.9rem;
            resize: vertical;
            min-height: 70px;
            background: #fdfbf8;
            transition: var(--transition);
        }
        .doc-edit-area textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 117, 60, 0.08);
            outline: none;
        }
        .doc-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .practice-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f1f5f9;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
        }
        /* ===== 动作管理样式 ===== */
        .manage-tricks-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .manage-tricks-toolbar .left {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .manage-tricks-toolbar .right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .trick-manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #faf7f3;
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .trick-manage-item:hover {
            background: #f5f0eb;
        }
        .trick-manage-item .info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .trick-manage-item .info .name {
            font-weight: 600;
        }
        .trick-manage-item .info .cn {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .trick-manage-item .info .badge-sm {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 30px;
        }
        .trick-manage-item .actions {
            display: flex;
            gap: 6px;
        }
        .trick-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .trick-form-grid .full-width {
            grid-column: 1 / -1;
        }
        .trick-form-grid label {
            font-weight: 600;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 2px;
            color: var(--text-secondary);
        }
        .trick-form-grid .input {
            width: 100%;
            min-width: unset;
        }
        .trick-form-grid textarea.input {
            min-height: 80px;
        }
        /* ===== 日历样式 ===== */
        .calendar-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .calendar-header .month-year {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .calendar-header .btn {
            padding: 4px 12px;
            font-size: 0.85rem;
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.9rem;
            font-weight: 500;
            background: transparent;
            transition: var(--transition);
            cursor: default;
            position: relative;
        }
        .calendar-day.has-log {
            background: #d1fae5;
            color: #065f46;
            font-weight: 700;
            cursor: pointer;
        }
        .calendar-day.has-log:hover {
            background: #a7f3d0;
            transform: scale(1.05);
        }
        .calendar-day.empty {
            visibility: hidden;
        }
        .calendar-day .dot {
            display: none;
        }
        .calendar-day.has-log .dot {
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #065f46;
            position: absolute;
            bottom: 4px;
        }
        .calendar-day.today {
            border: 2px solid var(--accent);
            font-weight: 700;
        }
        /* ===== 关系管理样式 ===== */
        .relation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #faf7f3;
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            border: 1px solid var(--border);
        }
        .relation-item .from-to {
            font-weight: 500;
        }
        .relation-item .from-to .arrow {
            color: var(--text-secondary);
            margin: 0 8px;
        }
        .relation-item .actions {
            display: flex;
            gap: 6px;
        }
        .relation-add-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 8px;
            padding: 12px;
            background: #f5f0eb;
            border-radius: var(--radius-sm);
        }
        .relation-add-form select {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-size: 0.85rem;
            background: #fff;
        }
        .relation-add-form .btn {
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            .trick-form-grid {
                grid-template-columns: 1fr;
            }
            .trick-manage-item {
                flex-wrap: wrap;
                gap: 8px;
            }
            .trick-manage-item .actions {
                width: 100%;
                justify-content: flex-end;
            }
            .app-header {
                padding: 10px 14px;
            }
            .app-logo {
                font-size: 1.2rem;
            }
            .app-logo .icon {
                font-size: 1.4rem;
            }
            .main-container {
                padding: 10px 12px;
            }
            .card {
                padding: 14px 16px;
            }
            .tab-btn {
                padding: 9px 12px;
                font-size: 0.8rem;
                min-width: 70px;
            }
            .btn {
                padding: 7px 14px;
                font-size: 0.82rem;
            }
            .modal {
                border-radius: 18px 18px 0 0;
                padding: 18px 14px 24px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .stat-value {
                font-size: 1.5rem;
            }
            .graph-container {
                min-height: 350px;
            }
            .graph-container svg {
                min-height: 350px;
            }
            .manage-tricks-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .manage-tricks-toolbar .left,
            .manage-tricks-toolbar .right {
                justify-content: center;
            }
            .calendar-day {
                font-size: 0.75rem;
            }
            .calendar-day .dot {
                width: 4px;
                height: 4px;
                bottom: 2px;
            }
            .relation-add-form {
                flex-direction: column;
                align-items: stretch;
            }
            .relation-add-form select {
                min-width: unset;
            }
        }
        @media (min-width: 768px) {
            .modal-overlay {
                align-items: center;
            }
            .modal-overlay.show {
                display: flex;
            }
            .modal {
                border-radius: 20px;
                max-height: 85vh;
                margin: 0 20px;
            }
            .modal-handle {
                display: none;
            }
        }
        @media print {
            body {
                background: #fff;
                padding-bottom: 0;
            }
            .app-header,
            .tab-nav,
            .btn,
            .modal-overlay,
            .filter-row,
            .log-actions,
            .header-actions,
            .modal-close,
            .modal-handle,
            .video-container,
            .video-placeholder,
            .input-group,
            .doc-actions,
            .manage-tricks-toolbar,
            .calendar-container {
                display: none !important;
            }
            .tab-content {
                display: block !important;
                page-break-inside: avoid;
            }
            .card,
            .log-item {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
            .main-container {
                max-width: 100%;
                padding: 0;
            }
        }
        #imageFileInput {
            display: none;
        }
        .modal-overlay.show {
            display: flex !important;
        }
    </style>
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-inner">
            <div class="app-logo">
                <span class="icon">🛹</span> 滑板学习记录
            </div>
            <div class="header-actions">
                <button class="btn btn-outline btn-sm" onclick="exportData()" title="导出备份">📥 备份</button>
                <button class="btn btn-outline btn-sm" onclick="importDataPrompt()" title="导入备份">📤 恢复</button>
                <input type="file" id="importFileInput" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </header>
    <!-- ==================== MAIN ==================== -->
    <div class="main-container">
        <!-- TABS -->
        <nav class="tab-nav" id="tabNav">
            <button class="tab-btn active" data-tab="tab-list">📋 动作清单</button>
            <button class="tab-btn" data-tab="tab-log">✅ 打卡记录</button>
            <button class="tab-btn" data-tab="tab-stats">📊 统计</button>
            <button class="tab-btn" data-tab="tab-graph">🗺️ 关系图</button>
        </nav>
        <!-- TAB: 动作清单 -->
        <div class="tab-content active" id="tab-list">
            <div class="manage-tricks-toolbar">
                <div class="left">
                    <span style="font-weight:600;font-size:1.05rem;">📋 动作清单</span>
                    <span style="font-size:0.8rem;color:var(--text-secondary);" id="trickCountDisplay"></span>
                </div>
                <div class="right">
                    <button class="btn btn-primary btn-sm" id="manageTricksBtn" onclick="window.openManageTricksModal()">⚙️ 管理动作</button>
                </div>
            </div>
            <div id="trickListContainer"></div>
        </div>
        <!-- TAB: 打卡记录 -->
        <div class="tab-content" id="tab-log">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
                <h2 style="font-size:1.2rem;font-weight:700;">✅ 打卡记录</h2>
                <button class="btn btn-primary btn-sm" onclick="openAddLogModal()">➕ 新增记录</button>
            </div>
            <div class="calendar-container" id="calendarContainer">
                <div class="calendar-header">
                    <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)">◀ 上月</button>
                    <span class="month-year" id="calendarMonthYear"></span>
                    <button class="btn btn-outline btn-sm" onclick="changeMonth(1)">下月 ▶</button>
                </div>
                <div class="calendar-weekdays">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>
            <div class="filter-row">
                <select id="logFilterTrick" onchange="renderLogs()">
                    <option value="all">全部动作</option>
                </select>
                <select id="logFilterCategory" onchange="renderLogs()">
                    <option value="all">全部分类</option>
                    <option value="bowl">碗池</option>
                    <option value="street">街市</option>
                </select>
                <input type="date" id="logFilterDate" onchange="renderLogs()" style="max-width:150px;" title="按日期筛选">
                <button class="btn btn-ghost btn-xs" onclick="clearLogFilters()">清除筛选</button>
            </div>
            <div id="logListContainer"></div>
        </div>
        <!-- TAB: 统计 -->
        <div class="tab-content" id="tab-stats">
            <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:14px;">📊 练习统计</h2>
            <div class="stats-grid" id="statsGrid"></div>
            <div id="statsDetailContainer"></div>
        </div>
        <!-- TAB: 关系图 -->
        <div class="tab-content" id="tab-graph">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
                <h2 style="font-size:1.2rem;font-weight:700;">🗺️ 动作关系脉络</h2>
                <button class="btn btn-primary btn-sm" onclick="openEditRelationsModal()">✏️ 编辑关系</button>
            </div>
            <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:12px;">
                💡 点击节点查看详情 · 拖拽节点自由调整 · 滚轮缩放 · 右键拖拽平移
            </p>
            <div class="graph-container" id="graphContainer">
                <svg id="graphSvg"></svg>
            </div>
            <div class="graph-legend">
                <span class="graph-legend-item"><span class="graph-legend-dot lv1"></span> 初级 ⭐</span>
                <span class="graph-legend-item"><span class="graph-legend-dot lv2"></span> 中级 ⭐⭐</span>
                <span class="graph-legend-item"><span class="graph-legend-dot lv3"></span> 高级 ⭐⭐⭐</span>
                <span class="graph-legend-item">➜ 箭头表示前置关系</span>
            </div>
        </div>
    </div>
    <!-- ==================== MODAL OVERLAY ==================== -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalInner"></div>
        </div>
    </div>
    <!-- 隐藏的文件输入用于插入图片 -->
    <input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageFileSelect(event)">

    <script>
        // ==================== 存储键 ====================
        const STORAGE_KEY_LOGS = 'skateboard_practice_logs';
        const STORAGE_KEY_VIDEOS = 'skateboard_trick_videos';
        const STORAGE_KEY_STATUS = 'skateboard_trick_status';
        const STORAGE_KEY_DOCS = 'skateboard_trick_docs';
        const STORAGE_KEY_TRICKS = 'skateboard_tricks_data';
        const STORAGE_KEY_RELATIONS = 'skateboard_relations';

        // ==================== 默认动作数据（初始库） ====================
        const DEFAULT_TRICKS_DATA = {
            bowl: {
                name: '碗池动作',
                icon: '🏊',
                dotClass: 'dot-bowl',
                badgeClass: 'badge-bowl',
                levels: [{
                    level: '初级',
                    stars: 1,
                    tricks: [
                        { id: 'bowl_dropping_in', name: 'Dropping In', cn: '下碗/切入', desc: '从碗池边缘（coping）滑入碗池内部。\n\n要领：\n1. 将板尾卡在coping上，后轮悬空\n2. 前脚踩在板头螺栓处\n3. 身体重心前倾，眼睛看向碗底\n4. 果断下压前脚，让前轮着地\n5. 身体跟随板子滑入碗池\n6. 关键：不要犹豫，犹豫就容易摔\n\n常见问题：重心后仰导致后摔；前脚下压不够果断。' },
                        { id: 'bowl_pumping', name: 'Pumping', cn: '摆动加速', desc: '不靠蹬地，仅通过身体上下摆动在碗池中获得速度。\n\n要领：\n1. 滑行中利用碗池的弧面\n2. 上弧面时身体下沉（屈膝）\n3. 到达弧面顶部时身体上弹（伸腿）\n4. 下弧面时再次屈膝蓄力\n5. 节奏感很重要，像荡秋千一样\n6. 手臂配合身体摆动保持平衡\n\n常见问题：节奏不对导致减速；身体僵硬不够放松。' },
                        { id: 'bowl_kickturn', name: 'Kickturn', cn: '踢转/抬板转', desc: '在弧面上抬起前轮进行转身。\n\n要领：\n1. 滑上弧面减速至几乎停止\n2. 轻抬前脚让前轮离地\n3. 用后轮为轴心转动身体\n4. 头部和肩膀先转向目标方向\n5. 转完后前轮着地滑下\n6. 先在平地上练习抬板头转向\n\n常见问题：转不够角度；抬起太高失去平衡。' },
                        { id: 'bowl_carving', name: 'Carving', cn: '弧线滑行', desc: '在碗池中沿弧线大幅度转弯滑行。\n\n要领：\n1. 身体倾斜配合转弯\n2. 用脚踝控制板子倾斜角度\n3. 视线引导转弯方向\n4. 保持流畅的速度\n5. 双膝微屈，重心放在脚掌\n6. 像冲浪/滑雪一样的感觉\n\n常见问题：转弯太急失去抓地力；身体和板子不同步。' },
                        { id: 'bowl_fakie_kickturn', name: 'Fakie Kickturn', cn: '倒滑踢转', desc: '倒滑时在弧面上进行踢转。\n\n要领：\n1. 倒滑上弧面\n2. 抬起前脚（此时是板尾方向）\n3. 转头看向要转的方向\n4. 以着地的轮子为轴转动\n5. 转完后继续倒滑或变正滑\n\n常见问题：方向感混乱；转头不够导致转不过去。' },
                    ]
                }, {
                    level: '中级',
                    stars: 2,
                    tricks: [
                        { id: 'bowl_rock_to_fakie', name: 'Rock to Fakie', cn: '卡沿回落', desc: '滑上coping让板子中间卡在沿上，然后倒滑回落。\n\n要领：\n1. 正滑上弧面冲向coping\n2. 让板子前半部分越过coping\n3. 板子中间（桥之间）卡在coping上\n4. 身体重心保持在碗内\n5. 轻轻后拉让板子回落\n6. 回落时变成倒滑（fakie）\n\n常见问题：板子卡太多翻过去；回落时失去平衡。' },
                        { id: 'bowl_tail_stall', name: 'Tail Stall', cn: '板尾停驻', desc: '用板尾卡在coping上短暂停驻。\n\n要领：\n1. 滑上弧面接近coping\n2. 用后脚踩板尾\n3. 板尾卡在coping上停住\n4. 身体重心在碗池内侧\n5. 停顿1-2秒后推板回落\n\n常见问题：重心太靠外导致后翻；停驻时间过长失去平衡。' },
                        { id: 'bowl_axle_stall', name: 'Axle Stall', cn: '桥停驻', desc: '用后桥卡在coping上停驻。\n\n要领：\n1. 滑上弧面让后桥正好卡在coping上\n2. 身体保持平衡\n3. 板子与coping垂直或略倾斜\n4. 短暂停驻后推回落\n\n常见问题：桥没卡准滑落；重心不稳。' },
                        { id: 'bowl_5050_grind', name: '50-50 Grind', cn: '双桥碾沿', desc: '用前后两个桥同时在coping上碾磨滑行。\n\n要领：\n1. 以一定角度滑上coping\n2. 让前后桥同时落在coping上\n3. 身体保持在碗池内侧\n4. 沿coping滑行一段\n5. 到合适位置推板回落\n\n常见问题：只卡到一个桥；速度太快飞出去。' },
                        { id: 'bowl_feeble_grind', name: 'Feeble Grind', cn: '后桥碾沿', desc: '后桥在coping上碾磨，前轮在碗池弧面上。\n\n要领：\n1. 滑上coping让后桥卡住\n2. 前轮保持在弧面上\n3. 身体重心偏后\n4. 沿coping滑行\n5. 此动作比50-50容易入门\n\n常见问题：前轮也上了coping变成50-50；后桥滑脱。' },
                        { id: 'bowl_rock_and_roll', name: 'Rock and Roll', cn: '卡沿转身', desc: '类似Rock to Fakie但在coping上转身180度正滑回落。\n\n要领：\n1. 卡上coping后\n2. 在板子上转身180度\n3. 变成正滑方向\n4. 推板回落正滑\n\n常见问题：转身时板子滑动；转身不够完全。' },
                        { id: 'bowl_slash_grind', name: 'Slash Grind', cn: '快速碾沿', desc: '快速滑上coping用后桥轻触即走的碾磨。\n\n要领：\n1. 以较快速度滑上\n2. 后桥轻触coping\n3. 不做停顿立即回落\n4. 像"蹭"一下的感觉\n\n常见问题：触沿时间太长；速度控制不好。' },
                    ]
                }, {
                    level: '高级',
                    stars: 3,
                    tricks: [
                        { id: 'bowl_air_out', name: 'Air Out', cn: '腾空飞出', desc: '从碗池中腾空飞出落到池外平地。\n\n要领：\n1. 高速滑上弧面\n2. 在弧面顶端身体向上弹起\n3. 板子离开coping腾空\n4. 控制板子在脚下\n5. 落到池外平地\n\n常见问题：腾空不够高；板子飞脱；落地不稳。' },
                        { id: 'bowl_frontside_air', name: 'Frontside Air', cn: '前侧腾空', desc: '腾空时身体前侧面向coping。\n\n要领：\n1. 高速滑上弧面\n2. 腾空时身体转向\n3. 前侧朝向coping\n4. 在空中控板\n5. 落回碗池内\n\n常见问题：转向不够；空中失控。' },
                        { id: 'bowl_backside_air', name: 'Backside Air', cn: '后侧腾空', desc: '腾空时身体后侧（背部）面向coping。\n\n要领：\n1. 高速滑上弧面\n2. 腾空时背部转向coping\n3. 视线越过肩膀看落点\n4. 在空中保持板子贴脚\n5. 落回碗池\n\n常见问题：看不到落点；旋转过度。' },
                        { id: 'bowl_invert', name: 'Invert', cn: '倒立支撑', desc: '在coping上用手支撑身体倒立。\n\n要领：\n1. 滑上弧面后手抓coping\n2. 身体向上翻转\n3. 脚和板子在空中\n4. 用手支撑体重\n5. 极其进阶的动作\n\n常见问题：手臂力量不足；恐惧心理。' },

        // ==================== 动作数据管理 ====================
        function flattenDefaultTricks() {
            const result = [];
            for (const cat of ['bowl', 'street']) {
                const catData = DEFAULT_TRICKS_DATA[cat];
                for (const level of catData.levels) {
                    for (const trick of level.tricks) {
                        result.push({
                            id: trick.id,
                            name: trick.name,
                            cn: trick.cn,
                            category: cat,
                            level: level.level,
                            stars: level.stars,
                            desc: trick.desc
                        });
                    }
                }
            }
            return result;
        }

        function loadTricks() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY_TRICKS);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        return parsed;
                    }
                }
            } catch (e) { /* ignore */ }
            const defaultTricks = flattenDefaultTricks();
            saveTricks(defaultTricks);
            return defaultTricks;
        }

        function saveTricks(tricks) {
            localStorage.setItem(STORAGE_KEY_TRICKS, JSON.stringify(tricks));
        }

        let _tricksCache = null;

        function getAllTricks() {
            if (!_tricksCache) {
                _tricksCache = loadTricks();
            }
            return _tricksCache;
        }

        function refreshTricksCache() {
            _tricksCache = loadTricks();
            return _tricksCache;
        }

        function getTrickById(id) {
            const tricks = getAllTricks();
            return tricks.find(t => t.id === id) || null;
        }

        function generateTrickId() {
            const existing = getAllTricks();
            const ids = existing.map(t => t.id);
            let base = 'trick_';
            let counter = 1;
            while (ids.includes(base + counter)) {
                counter++;
            }
            return base + counter;
        }

        function addTrick(name, cn, category, stars, desc) {
            const tricks = getAllTricks();
            const newTrick = {
                id: generateTrickId(),
                name: name.trim(),
                cn: cn.trim(),
                category: category,
                stars: parseInt(stars) || 1,
                level: ['初级', '中级', '高级'][(parseInt(stars) || 1) - 1] || '初级',
                desc: desc.trim() || '暂无描述'
            };
            tricks.push(newTrick);
            saveTricks(tricks);
            refreshTricksCache();
            return newTrick;
        }

        function updateTrick(id, name, cn, category, stars, desc) {
            const tricks = getAllTricks();
            const idx = tricks.findIndex(t => t.id === id);
            if (idx === -1) return false;
            tricks[idx] = {
                ...tricks[idx],
                name: name.trim(),
                cn: cn.trim(),
                category: category,
                stars: parseInt(stars) || 1,
                level: ['初级', '中级', '高级'][(parseInt(stars) || 1) - 1] || '初级',
                desc: desc.trim() || '暂无描述'
            };
            saveTricks(tricks);
            refreshTricksCache();
            return true;
        }

        function deleteTrick(id) {
            if (!confirm('确定要删除这个动作吗？\n\n⚠️ 将同时删除该动作的所有：\n• 打卡记录\n• 视频链接\n• 文档内容\n• 掌握状态\n• 相关关系')) {
                return false;
            }
            const tricks = getAllTricks();
            const newTricks = tricks.filter(t => t.id !== id);
            if (newTricks.length === tricks.length) return false;
            saveTricks(newTricks);
            refreshTricksCache();
            let logs = loadLogs();
            logs = logs.filter(l => l.trickId !== id);
            saveLogs(logs);
            const videos = loadVideos();
            if (videos[id]) {
                delete videos[id];
                saveVideos(videos);
            }
            const docs = loadDocuments();
            if (docs[id]) {
                delete docs[id];
                saveDocuments(docs);
            }
            const statuses = loadStatuses();
            if (statuses[id]) {
                delete statuses[id];
                saveStatuses(statuses);
            }
            let relations = loadRelations();
            relations = relations.filter(r => r.from !== id && r.to !== id);
            saveRelations(relations);
            return true;
        }

        function getPracticeCount(trickId) {
            const logs = loadLogs();
            return logs.filter(l => l.trickId === trickId).length;
        }

        // ==================== 关系管理 ====================
        function loadRelations() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY_RELATIONS);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) {
                        const allTricks = getAllTricks();
                        const validIds = new Set(allTricks.map(t => t.id));
                        return parsed.filter(r => validIds.has(r.from) && validIds.has(r.to));
                    }
                }
            } catch (e) { /* ignore */ }
            saveRelations(DEFAULT_RELATIONS);
            return [...DEFAULT_RELATIONS];
        }

        function saveRelations(relations) {
            localStorage.setItem(STORAGE_KEY_RELATIONS, JSON.stringify(relations));
        }

        function addRelation(from, to) {
            const relations = loadRelations();
            if (relations.some(r => r.from === from && r.to === to)) {
                alert('该关系已存在');
                return false;
            }
            if (from === to) {
                alert('不能自己连自己');
                return false;
            }
            const allTricks = getAllTricks();
            const ids = new Set(allTricks.map(t => t.id));
            if (!ids.has(from) || !ids.has(to)) {
                alert('动作不存在');
                return false;
            }
            relations.push({ from, to });
            saveRelations(relations);
            return true;
        }

        function removeRelation(index) {
            const relations = loadRelations();
            if (index >= 0 && index < relations.length) {
                relations.splice(index, 1);
                saveRelations(relations);
                return true;
            }
            return false;
        }

        // ==================== 日历功能 ====================
        let calendarYear, calendarMonth;

        function initCalendar() {
            const now = new Date();
            calendarYear = now.getFullYear();
            calendarMonth = now.getMonth();
            renderCalendar();
        }

        function changeMonth(delta) {
            calendarMonth += delta;
            if (calendarMonth < 0) {
                calendarMonth = 11;
                calendarYear--;
            } else if (calendarMonth > 11) {
                calendarMonth = 0;
                calendarYear++;
            }
            renderCalendar();
        }

        function renderCalendar() {
            const monthYearEl = document.getElementById('calendarMonthYear');
            const daysContainer = document.getElementById('calendarDays');
            if (!monthYearEl || !daysContainer) return;

            const months = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            monthYearEl.textContent = `${calendarYear}年 ${months[calendarMonth]}`;

            const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
            const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

            const logs = loadLogs();
            const logDates = new Set(logs.map(log => log.date));

            let html = '';
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day empty"></div>`;
            }
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasLog = logDates.has(dateStr);
                const isToday = dateStr === todayStr;
                let cls = 'calendar-day';
                if (hasLog) cls += ' has-log';
                if (isToday) cls += ' today';
                html += `<div class="${cls}" data-date="${dateStr}" ${hasLog ? `onclick="filterByDate('${dateStr}')"` : ''}>
                            ${d}
                            <span class="dot"></span>
                        </div>`;
            }
            daysContainer.innerHTML = html;
        }

        function filterByDate(dateStr) {
            const dateInput = document.getElementById('logFilterDate');
            if (dateInput) {
                dateInput.value = dateStr;
                renderLogs();
            }
        }

        function renderTrickList() {
            const container = document.getElementById('trickListContainer');
            const statuses = loadStatuses();
            const allTricks = getAllTricks();

            document.getElementById('trickCountDisplay').textContent = `共 ${allTricks.length} 个动作`;

            if (allTricks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">📭</span>
                        <p>还没有动作</p>
                        <p style="font-size:0.85rem;">点击「管理动作」添加第一个动作吧！</p>
                    </div>`;
                return;
            }

            const grouped = { bowl: { 1: [], 2: [], 3: [] }, street: { 1: [], 2: [], 3: [] } };
            for (const t of allTricks) {
                const cat = t.category || 'street';
                const stars = t.stars || 1;
                if (!grouped[cat]) grouped[cat] = { 1: [], 2: [], 3: [] };
                if (!grouped[cat][stars]) grouped[cat][stars] = [];
                grouped[cat][stars].push(t);
            }

            let html = '';
            for (const catKey of ['bowl', 'street']) {
                const catInfo = getCategoryInfo(catKey);
                const catData = grouped[catKey];
                if (!catData || Object.values(catData).every(arr => arr.length === 0)) continue;

                html += `
                    <div class="section-title">
                        <span class="dot ${catInfo.dotClass}"></span>
                        ${catInfo.icon} ${catKey === 'bowl' ? '碗池动作' : '街市动作'}
                    </div>`;

                for (const stars of [1, 2, 3]) {
                    const tricksInLevel = catData[stars] || [];
                    if (tricksInLevel.length === 0) continue;
                    const starHtml = getStarsHtml(stars);
                    const levelLabel = getLevelLabel(stars);
                    html += `
                        <div style="margin-bottom:6px;font-weight:600;font-size:0.9rem;color:var(--text-secondary);padding-left:4px;">
                            ${levelLabel} <span class="difficulty-stars">${starHtml}</span>
                        </div>`;
                    for (const trick of tricksInLevel) {
                        const status = statuses[trick.id] || 'new';
                        const statusBadgeMap = {
                            'new': '<span class="badge badge-status badge-new">未开始</span>',
                            'practice': '<span class="badge badge-status badge-practice">练习中</span>',
                            'mastered': '<span class="badge badge-status badge-mastered">已掌握</span>',
                        };
                        const statusBadge = statusBadgeMap[status] || statusBadgeMap['new'];
                        html += `
                            <div class="card" onclick="openTrickDetail('${trick.id}')" style="cursor:pointer;">
                                <div class="card-header">
                                    <div class="card-title">
                                        <span class="badge ${catInfo.badgeClass}">${catKey === 'bowl' ? '碗池' : '街市'}</span>
                                        ${trick.name}
                                        <span class="card-subtitle">${trick.cn || ''}</span>

                                        ${statusBadge}
                                        <span class="difficulty-stars">${starHtml}</span>
                                    </div>
                                </div>
                            </div>`;
                    }
                }
            }
            container.innerHTML = html;
        }

                const items = e.clipboardData.items;

                    if (item.type.startsWith('image/')) {

                        const file = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            const img = document.createElement('img');
                            img.src = ev.target.result;
                            img.style.maxWidth = '100%';

                            img.style.margin = '8px 0';
                            img.style.display = 'block';
                            document.execCommand('insertHTML', false, img.outerHTML);
                        };
                        reader.readAsDataURL(file);
                        break;
                    }
                }
            });
        };

            if (!url) return null;

            if (match) return `https://www.youtube.com/embed/${match[1]}`;
            match = url.match(/bilibili\.com\/video\/(BV[a-zA-Z0-9]+)/);
            if (match) return `//player.bilibili.com/player.html?bvid=${match[1]}&page=1`;
            return null;
        }

        // ==================== RENDER: 统计 ====================
        function renderStats() {
            const logs = loadLogs();
            const statuses = loadStatuses();
            const allTricks = getAllTricks();
            const grid = document.getElementById('statsGrid');
            const detailContainer = document.getElementById('statsDetailContainer');
            const totalAttempts = logs.reduce((sum, l) => sum + (l.attempts || 0), 0);
            const totalLogs = logs.length;
            const uniqueTricksPracticed = new Set(logs.map(l => l.trickId)).size;
            const totalTricks = allTricks.length;
            const masteredCount = Object.values(statuses).filter(s => s === 'mastered').length;
            const practiceCount = Object.values(statuses).filter(s => s === 'practice').length;
            const progressPercent = totalTricks > 0 ? Math.round((masteredCount / totalTricks) * 100) : 0;
            const dates = [...new Set(logs.map(l => l.date))].sort((a, b) => new Date(b) - new Date(a));
            let streak = 0;
            if (dates.length > 0) {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const checkDate = new Date(dates[0]);
                checkDate.setHours(0, 0, 0, 0);
                if (checkDate.getTime() === today.getTime() || checkDate.getTime() === yesterday.getTime()) {
                    streak = 1;
                    for (let i = 1; i < dates.length; i++) {
                        const d1 = new Date(dates[i - 1]);
                        const d2 = new Date(dates[i]);
                        d1.setHours(0, 0, 0, 0);
                        d2.setHours(0, 0, 0, 0);
                        const diff = (d1.getTime() - d2.getTime()) / (1000 * 60 * 60 * 24);
                        if (diff === 1) streak++;
                        else break;
                    }
                }
            }
            grid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalLogs}</div>
                    <div class="stat-label">总打卡次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalAttempts}</div>
                    <div class="stat-label">总练习次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueTricksPracticed}/${totalTricks}</div>
                    <div class="stat-label">练习动作数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">🔥 ${streak}</div>
                    <div class="stat-label">连续打卡天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:var(--success);">${masteredCount}</div>
                    <div class="stat-label">已掌握动作</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${progressPercent}%</div>
                    <div class="stat-label">掌握进度</div>
                    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progressPercent}%;"></div></div>
                </div>
            `;
            const trickStats = {};
            for (const log of logs) {
                if (!trickStats[log.trickId]) {
                    trickStats[log.trickId] = { count: 0, totalAttempts: 0, lastDate: log.date };
                }
                trickStats[log.trickId].count++;
                trickStats[log.trickId].totalAttempts += (log.attempts || 0);
                if (log.date > trickStats[log.trickId].lastDate) {
                    trickStats[log.trickId].lastDate = log.date;
                }
            }
            const sortedTricks = Object.entries(trickStats)
                .sort((a, b) => b[1].totalAttempts - a[1].totalAttempts)
                .slice(0, 15);
            if (sortedTricks.length > 0) {
                let detailHtml =
                    '<h3 style="font-size:1rem;font-weight:700;margin:16px 0 10px;">🏆 练习最多的动作（按总次数排序）</h3>';
                for (const [trickId, stats] of sortedTricks) {
                    const trick = getTrickById(trickId);
                    const name = trick ? trick.name : trickId;
                    const catLabel = (trick && trick.category === 'bowl') ? '碗池' : '街市';
                    const status = statuses[trickId] || 'new';
                    const statusEmoji = status === 'mastered' ? '✅' : status === 'practice' ? '🔄' : '⬜';
                    detailHtml += `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#faf7f3;border-radius:8px;margin-bottom:6px;flex-wrap:wrap;gap:6px;">
                            <span>${statusEmoji} <strong>${name}</strong> <span style="font-size:0.75rem;color:var(--text-secondary);">[${catLabel}]</span></span>
                            <span style="font-size:0.85rem;">📅 ${stats.lastDate} | 练习 <strong>${stats.totalAttempts}</strong> 次 | 打卡 ${stats.count} 天</span>
                        </div>`;
                }
                detailContainer.innerHTML = detailHtml;
            } else {
                detailContainer.innerHTML =
                    '<div class="empty-state"><span class="emoji">📊</span><p>开始打卡后这里会显示统计数据</p></div>';
            }
        }

        // ==================== 关系图渲染（使用 D3 力导向图） ====================
        function renderGraph() {
            const container = document.getElementById('graphContainer');
            const svgElement = document.getElementById('graphSvg');
            if (!container || !svgElement) return;

            const allTricks = getAllTricks();
            if (allTricks.length === 0) {
                svgElement.innerHTML = `<text x="500" y="275" text-anchor="middle" fill="#94a3b8" font-size="20">暂无动作数据</text>`;
                return;
            }

            // 清空 SVG
            d3.select(svgElement).selectAll('*').remove();

            const width = container.clientWidth || 900;
            const height = 500;

            // 准备节点数据
            const logs = loadLogs();
            const nodes = allTricks.map(t => ({
                id: t.id,
                name: t.name,
                stars: t.stars,
                count: logs.filter(l => l.trickId === t.id).length
            }));

            // 准备链接数据
            const relations = loadRelations();
            const validIds = new Set(nodes.map(n => n.id));
            const links = relations
                .filter(r => validIds.has(r.from) && validIds.has(r.to))
                .map(r => ({ source: r.from, target: r.to }));

            // 创建 SVG 画布
            const svg = d3.select(svgElement)
                .attr('viewBox', `0 0 ${width} ${height}`)
                .style('width', '100%')
                .style('height', '100%');

            // 定义箭头标记
            const defs = svg.append('defs');
            defs.append('marker')
                .attr('id', 'arrowhead')
                .attr('markerWidth', 10)
                .attr('markerHeight', 7)
                .attr('refX', 9)
                .attr('refY', 3.5)
                .attr('orient', 'auto')
                .append('polygon')
                .attr('points', '0 0, 10 3.5, 0 7')
                .attr('fill', '#94a3b8');

            // 添加阴影滤镜
            const filter = defs.append('filter')
                .attr('id', 'shadow')
                .attr('x', '-20%')
                .attr('y', '-20%')
                .attr('width', '140%')
                .attr('height', '140%');
            filter.append('feDropShadow')
                .attr('dx', 1)
                .attr('dy', 2)
                .attr('stdDeviation', 3)
                .attr('flood-opacity', 0.12);

            // 容器组（用于缩放和平移）
            const g = svg.append('g');

            // 力模拟
            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(150).strength(0.8))
                .force('charge', d3.forceManyBody().strength(-500))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(50));

            // 绘制连线
            const linkGroup = g.append('g')
                .attr('class', 'links')
                .selectAll('path')
                .data(links)
                .enter()
                .append('path')
                .attr('class', 'graph-edge')
                .attr('marker-end', 'url(#arrowhead)');

            // 绘制节点
            const colors = { 1: '#f59e0b', 2: '#3b82f6', 3: '#ef4444' };
            const nodeGroup = g.append('g')
                .attr('class', 'nodes')
                .selectAll('g')
                .data(nodes)
                .enter()
                .append('g')
                .attr('class', 'graph-node-group')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended)
                )
                .on('click', (event, d) => {
                    window.openTrickDetail(d.id);
                });

            // 节点圆形
            nodeGroup.append('circle')
                .attr('r', d => 30 + Math.min(d.count * 1.2, 15))
                .attr('fill', d => colors[d.stars] || '#94a3b8')
                .attr('filter', 'url(#shadow)')
                .attr('stroke', '#fff')
                .attr('stroke-width', 2);

            // 节点文字
            nodeGroup.append('text')
                .attr('dy', 2)
                .text(d => d.name)
                .attr('font-size', d => (30 + Math.min(d.count * 1.2, 15)) > 38 ? 12 : 10)
                .attr('font-weight', 600)
                .attr('fill', '#fff')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .style('pointer-events', 'none')
                .style('text-shadow', '0 1px 3px rgba(0,0,0,0.3)');

            // 标题提示
            nodeGroup.append('title')
                .text(d => `${d.name} · 练习${d.count}次 · ${getLevelLabel(d.stars)}`);

            // 更新位置
            simulation.on('tick', () => {
                linkGroup.attr('d', d => {
                    const dx = d.target.x - d.source.x;
                    const dy = d.target.y - d.source.y;
                    const dr = Math.sqrt(dx * dx + dy * dy);
                    // 避免重叠时方向错乱
                    if (dr === 0) return `M ${d.source.x} ${d.source.y} L ${d.target.x} ${d.target.y}`;
                    const offsetX = (dx / dr) * 12;
                    const offsetY = (dy / dr) * 12;
                    const sx = d.source.x + offsetX;
                    const sy = d.source.y + offsetY;
                    const tx = d.target.x - offsetX;
                    const ty = d.target.y - offsetY;
                    const mx = (sx + tx) / 2;
                    const my = (sy + ty) / 2 - 20;
                    return `M ${sx} ${sy} Q ${mx} ${my} ${tx} ${ty}`;
                });
                nodeGroup.attr('transform', d => `translate(${d.x}, ${d.y})`);
            });

            // 拖拽函数
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }

            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }

            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                // 如果用户不想固定位置，可以解除注释下面两行让节点归位
                // d.fx = null;
                // d.fy = null;
            }

            // 添加缩放功能
            const zoom = d3.zoom()
                .scaleExtent([0.3, 3])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom)
                .on('dblclick.zoom', () => {
                    // 双击重置缩放
                    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
                });

            // 处理窗口大小变化
            window.addEventListener('resize', () => {
                const newWidth = container.clientWidth || 900;
                svg.attr('viewBox', `0 0 ${newWidth} ${height}`);
            });
        }

        // ==================== 数据导入导出 ====================
        window.exportData = function() {
            const data = {
                tricks: getAllTricks(),
                logs: loadLogs(),
                videos: loadVideos(),
                statuses: loadStatuses(),
                docs: loadDocuments(),
                relations: loadRelations(),
                exportedAt: new Date().toISOString(),
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `滑板学习记录_备份_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        window.importDataPrompt = function() {
            document.getElementById('importFileInput').click();
        };

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm('导入数据将覆盖现有记录，确定继续吗？')) {
                event.target.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.tricks && Array.isArray(data.tricks)) {
                        saveTricks(data.tricks);
                        refreshTricksCache();
                    }
                    if (data.logs && Array.isArray(data.logs)) {
                        saveLogs(data.logs);
                    }
                    if (data.videos && typeof data.videos === 'object') {
                        saveVideos(data.videos);
                    }
                    if (data.statuses && typeof data.statuses === 'object') {
                        saveStatuses(data.statuses);
                    }
                    if (data.docs && typeof data.docs === 'object') {
                        saveDocuments(data.docs);
                    }
                    if (data.relations && Array.isArray(data.relations)) {
                        saveRelations(data.relations);
                    }
                    alert('✅ 数据导入成功！');
                    renderAll();
                } catch (err) {
                    alert('❌ 文件格式错误，请检查文件');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        };

        // ==================== TAB切换 ====================
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const btn = document.querySelector(`[data-tab="${tabName}"]`);
            const content = document.getElementById(tabName);
            if (btn) btn.classList.add('active');
            if (content) content.classList.add('active');
            if (tabName === 'tab-log') {
                renderLogs();
                if (calendarYear === undefined) initCalendar();
                else renderCalendar();
            }
            if (tabName === 'tab-stats') renderStats();
            if (tabName === 'tab-list') renderTrickList();
            if (tabName === 'tab-graph') {
                // 延迟渲染以确保容器尺寸正确
                setTimeout(renderGraph, 100);
            }
        }

        // ==================== 键盘事件 ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const overlay = document.getElementById('modalOverlay');
                if (overlay.classList.contains('show')) {
                    closeModal();
                }
            }
        });

        // ==================== 初始化 ====================
        function renderAll() {
            renderTrickList();
            renderLogs();
            renderStats();
            setTimeout(renderGraph, 200);
        }

        function init() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            refreshTricksCache();
            loadRelations();
            initCalendar();
            renderAll();

            const logs = loadLogs();
            if (logs.length === 0) {
                const sampleLogs = [{
                    id: 'sample_1',
                    date: new Date(Date.now() - 3 * 86400000).toISOString().split('T')[0],
                    trickId: 'street_ollie',
                    attempts: 50,
                    problems: '板子转歪了，肩膀跟着转',
                    corrections: '注意保持肩膀水平，前脚刷板要直',
                    notes: '第一次练习，感觉有进步空间',
                    createdAt: Date.now() - 3 * 86400000
                }, {
                    id: 'sample_2',
                    date: new Date(Date.now() - 1 * 86400000).toISOString().split('T')[0],
                    trickId: 'street_ollie',
                    attempts: 80,
                    problems: '高度还是不够',
                    corrections: '后脚pop更有力了，前脚刷板时机需要更早一点',
                    notes: '比上次好多了！',
                    createdAt: Date.now() - 1 * 86400000
                }, {
                    id: 'sample_3',
                    date: new Date().toISOString().split('T')[0],
                    trickId: 'bowl_dropping_in',
                    attempts: 20,
                    problems: '有点害怕，重心后仰',
                    corrections: '教练说重心要前倾，眼睛看碗底',
                    notes: '成功了一次！很开心',
                    createdAt: Date.now()
                }];
                saveLogs(sampleLogs);
                saveStatuses({ 'street_ollie': 'practice', 'bowl_dropping_in': 'practice' });
                renderAll();
            }

            console.log('🛹 滑板学习记录表已就绪！');
            console.log('📋 动作清单 - 可自由增删改动作');
            console.log('✅ 打卡记录 - 月度日历，绿色标记有打卡的日期');
            console.log('📊 统计 - 查看练习数据');
            console.log('🗺️ 关系图 - 力导向自动布局，可拖拽/缩放');
            console.log('📥 使用备份功能导出数据');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
