<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛹 滑板技巧记录表 - Skate Trick Tracker</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --accent: #e94560;
            --accent2: #ff6b6b;
            --gold: #f5c518;
            --green: #2ecc71;
            --orange: #f39c12;
            --text: #e0e0e0;
            --text2: #b0b0b0;
            --border: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            --font-sans: 'Segoe UI', 'system-ui', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(233, 68, 96, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(15, 52, 96, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(245, 197, 24, 0.03) 0%, transparent 70%);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-font-smoothing: antialiased;
        }
        /* 主容器 */
        .app-container {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 10px;
        }
        /* ========== 头部 ========== */
        .header {
            text-align: center;
            padding: 10px 0 6px;
        }
        .header .icon-row {
            font-size: 52px;
            animation: bounceSkate 2s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 8px 20px rgba(233, 68, 96, 0.4));
        }
        @keyframes bounceSkate {
            0%,
            100% {
                transform: translateY(0) rotate(-3deg);
            }
            30% {
                transform: translateY(-16px) rotate(2deg);
            }
            50% {
                transform: translateY(-6px) rotate(-1deg);
            }
            70% {
                transform: translateY(-22px) rotate(3deg);
            }
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 50%, var(--accent2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 2px;
        }
        .header .subtitle {
            color: var(--text2);
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            margin-top: 2px;
        }
        /* ========== 统计面板 ========== */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        @media (max-width: 500px) {
            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px 14px;
            text-align: center;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(255, 255, 255, 0.18);
        }
        .stat-card .stat-number {
            font-size: 2.4rem;
            font-weight: 900;
            font-family: var(--font-mono);
            letter-spacing: -0.03em;
            line-height: 1;
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            color: var(--text2);
            margin-top: 6px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .stat-card.total .stat-number {
            color: #fff;
        }
        .stat-card.mastered .stat-number {
            color: var(--green);
        }
        .stat-card.practicing .stat-number {
            color: var(--orange);
        }
        .stat-card.untried .stat-number {
            color: #888;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .stat-card.total::after {
            background: #fff;
        }
        .stat-card.mastered::after {
            background: var(--green);
        }
        .stat-card.practicing::after {
            background: var(--orange);
        }
        .stat-card.untried::after {
            background: #555;
        }
        /* ========== 操作栏 ========== */
        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-bar input {
            flex: 1;
            min-width: 180px;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--surface);
            color: #fff;
            font-size: 1rem;
            font-family: var(--font-sans);
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        .action-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(233, 68, 96, 0.12), inset 0 2px 6px rgba(0, 0, 0, 0.3);
            background: #1a1f35;
        }
        .action-bar input::placeholder {
            color: #666;
        }
        .action-bar select {
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--surface);
            color: #fff;
            font-size: 1rem;
            font-family: var(--font-sans);
            outline: none;
            cursor: pointer;
            transition: var(--transition);
            min-width: 130px;
            box-shadow: var(--shadow-md);
        }
        .action-bar select:focus {
            border-color: var(--accent);
        }
        .btn {
            padding: 14px 22px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.02em;
            font-family: var(--font-sans);
            white-space: nowrap;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-add {
            background: var(--accent);
            color: #fff;
        }
        .btn-add:hover {
            background: #ff5a75;
            box-shadow: 0 8px 28px rgba(233, 68, 96, 0.45);
            transform: translateY(-2px);
        }
        .btn-reset {
            background: transparent;
            color: var(--text2);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .btn-reset:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
        }
        .btn-filter {
            background: var(--surface2);
            color: #fff;
            border: 2px solid transparent;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.03em;
        }
        .btn-filter.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(233, 68, 96, 0.4);
        }
        .btn-filter:hover:not(.active) {
            background: #1a3d6e;
        }
        /* ========== 筛选按钮行 ========== */
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        /* ========== 技巧列表容器 ========== */
        #trickListContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 120px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 1.1rem;
            letter-spacing: 0.03em;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 2px dashed rgba(255, 255, 255, 0.08);
        }
        .empty-state .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            animation: bounceSkate 2.5s ease-in-out infinite;
        }
        /* ========== 单个技巧卡片 ========== */
        .trick-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
            position: relative;
            cursor: default;
            animation: fadeInUp 0.4s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .trick-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .trick-card .trick-icon {
            font-size: 2rem;
            flex-shrink: 0;
            width: 44px;
            text-align: center;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
        }
        .trick-card .trick-info {
            flex: 1;
            min-width: 0;
        }
        .trick-card .trick-name {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.01em;
            color: #fff;
            word-break: break-word;
        }
        .trick-card .trick-category {
            font-size: 0.75rem;
            color: var(--text2);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .trick-card .trick-date {
            font-size: 0.7rem;
            color: #666;
            margin-top: 1px;
        }
        .trick-card .trick-status-badge {
            flex-shrink: 0;
            padding: 7px 14px;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            border: 2px solid transparent;
            white-space: nowrap;
        }
        .badge-mastered {
            background: rgba(46, 204, 113, 0.18);
            color: var(--green);
            border-color: rgba(46, 204, 113, 0.4) !important;
        }
        .badge-practicing {
            background: rgba(243, 156, 18, 0.18);
            color: var(--orange);
            border-color: rgba(243, 156, 18, 0.4) !important;
        }
        .badge-untried {
            background: rgba(150, 150, 150, 0.12);
            color: #999;
            border-color: rgba(150, 150, 150, 0.3) !important;
        }
        .trick-status-badge:hover {
            transform: scale(1.06);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
        }
        .btn-delete {
            background: transparent;
            border: none;
            color: #666;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: var(--transition);
            flex-shrink: 0;
            line-height: 1;
        }
        .btn-delete:hover {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }
        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222;
            color: #fff;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 600;
            letter-spacing: 0.03em;
            z-index: 999;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            font-size: 0.9rem;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .header .icon-row {
                font-size: 38px;
            }
            .stat-card .stat-number {
                font-size: 1.7rem;
            }
            .stat-card .stat-label {
                font-size: 0.68rem;
            }
            .trick-card {
                padding: 12px 14px;
                gap: 10px;
                flex-wrap: wrap;
            }
            .trick-card .trick-icon {
                font-size: 1.5rem;
                width: 32px;
            }
            .trick-card .trick-status-badge {
                font-size: 0.7rem;
                padding: 5px 10px;
            }
            .btn {
                padding: 12px 16px;
                font-size: 0.85rem;
            }
            .action-bar input,
            .action-bar select {
                padding: 12px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ==================== 头部 ==================== -->
        <div class="header">
            <div class="icon-row">🛹</div>
            <h1>滑板技巧记录表</h1>
            <p class="subtitle">Skate Trick Tracker · 追踪每一个动作的进步</p>
        </div>
        <!-- ==================== 统计面板 ==================== -->
        <div class="stats-panel" id="statsPanel">
            <div class="stat-card total">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">总计技巧</div>
            </div>
            <div class="stat-card mastered">
                <div class="stat-number" id="statMastered">0</div>
                <div class="stat-label">已掌握 ✅</div>
            </div>
            <div class="stat-card practicing">
                <div class="stat-number" id="statPracticing">0</div>
                <div class="stat-label">练习中 🔥</div>
            </div>
            <div class="stat-card untried">
                <div class="stat-number" id="statUntried">0</div>
                <div class="stat-label">未尝试 ⬜</div>
            </div>
        </div>
        <!-- ==================== 添加技巧区域 ==================== -->
        <div class="action-bar" id="addTrickArea">
            <input
            type="text"
            id="trickNameInput"
            placeholder="输入技巧名称，如 Kickflip、Boardslide..."
            maxlength="50"
            autocomplete="off"
            />
            <select id="categorySelect">
                <option value="flip">🔄 Flip Tricks 翻板</option>
                <option value="grind">🛤️ Grinds 呲台</option>
                <option value="slide">🛝 Slides 滑行</option>
                <option value="grab">✋ Grabs 抓板</option>
                <option value="manual">⚖️ Manuals 平衡</option>
                <option value="ramp">🏔️ Ramp 坡面</option>
                <option value="flatground">🏁 Flatground 平地</option>
                <option value="other">📦 其他</option>
            </select>
            <button class="btn btn-add" id="btnAddTrick" title="添加技巧 (Enter)">＋ 添加</button>
            <button class="btn btn-reset" id="btnResetAll" title="清空全部记录">🗑️ 清空</button>
        </div>
        <!-- ==================== 筛选按钮 ==================== -->
        <div class="filter-row">
            <button class="btn-filter active" data-filter="all">📋 全部</button>
            <button class="btn-filter" data-filter="mastered">✅ 已掌握</button>
            <button class="btn-filter" data-filter="practicing">🔥 练习中</button>
            <button class="btn-filter" data-filter="untried">⬜ 未尝试</button>
            <button class="btn-filter" data-filter="flip">🔄 Flip</button>
            <button class="btn-filter" data-filter="grind">🛤️ Grind</button>
            <button class="btn-filter" data-filter="slide">🛝 Slide</button>
            <button class="btn-filter" data-filter="grab">✋ Grab</button>
            <button class="btn-filter" data-filter="manual">⚖️ Manual</button>
            <button class="btn-filter" data-filter="ramp">🏔️ Ramp</button>
            <button class="btn-filter" data-filter="flatground">🏁 Flatground</button>
            <button class="btn-filter" data-filter="other">📦 其他</button>
        </div>
        <!-- ==================== 技巧列表容器 ==================== -->
        <div id="trickListContainer">
            <!-- 动态渲染技巧卡片 -->
        </div>
        <!-- ==================== Toast 提示 ==================== -->
        <div class="toast" id="toast"></div>
    </div>
    <script>
        (function() {
            // ==================== DOM 元素引用 ====================
            const trickListContainer = document.getElementById('trickListContainer');
            const trickNameInput = document.getElementById('trickNameInput');
            const categorySelect = document.getElementById('categorySelect');
            const btnAddTrick = document.getElementById('btnAddTrick');
            const btnResetAll = document.getElementById('btnResetAll');
            const filterButtons = document.querySelectorAll('.btn-filter');
            const toast = document.getElementById('toast');
            const statTotal = document.getElementById('statTotal');
            const statMastered = document.getElementById('statMastered');
            const statPracticing = document.getElementById('statPracticing');
            const statUntried = document.getElementById('statUntried');
            // ==================== 状态管理 ====================
            const STORAGE_KEY = 'skate_trick_tracker_data_v2';
            let tricks = []; // { id, name, category, status, createdAt }
            let currentFilter = 'all'; // 当前筛选条件
            // status 枚举: 'untried' | 'practicing' | 'mastered'
            const STATUS_CONFIG = {
                untried: { label: '未尝试', badgeClass: 'badge-untried', icon: '⬜', next: 'practicing' },
                practicing: { label: '练习中', badgeClass: 'badge-practicing', icon: '🔥', next: 'mastered' },
                mastered: { label: '已掌握', badgeClass: 'badge-mastered', icon: '✅', next: 'untried' },
            };
            const CATEGORY_CONFIG = {
                flip: { label: 'Flip Tricks', icon: '🔄' },
                grind: { label: 'Grinds', icon: '🛤️' },
                slide: { label: 'Slides', icon: '🛝' },
                grab: { label: 'Grabs', icon: '✋' },
                manual: { label: 'Manuals', icon: '⚖️' },
                ramp: { label: 'Ramp', icon: '🏔️' },
                flatground: { label: 'Flatground', icon: '🏁' },
                other: { label: '其他', icon: '📦' },
            };
            // ==================== 本地存储 ====================
            function saveToStorage() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(tricks));
                } catch (e) {
                    showToast('⚠️ 存储空间不足，请清理旧数据');
                }
            }
            function loadFromStorage() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) {
                            tricks = parsed;
                            // 数据迁移/修复
                            tricks.forEach(t => {
                                if (!t.id) t.id = generateId();
                                if (!STATUS_CONFIG[t.status]) t.status = 'untried';
                                if (!CATEGORY_CONFIG[t.category]) t.category = 'other';
                                if (!t.createdAt) t.createdAt = new Date().toISOString();
                            });
                        }
                    }
                } catch (e) {
                    tricks = [];
                    showToast('⚠️ 数据读取失败，已重置');
                }
            }
            function generateId() {
                return 'trick_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            }
            // ==================== Toast ====================
            let toastTimer;
            function showToast(message) {
                clearTimeout(toastTimer);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }
            // ==================== 统计更新 ====================
            function updateStats() {
                const total = tricks.length;
                const mastered = tricks.filter(t => t.status === 'mastered').length;
                const practicing = tricks.filter(t => t.status === 'practicing').length;
                const untried = tricks.filter(t => t.status === 'untried').length;
                // 动画数字
                animateNumber(statTotal, total);
                animateNumber(statMastered, mastered);
                animateNumber(statPracticing, practicing);
                animateNumber(statUntried, untried);
            }
            function animateNumber(element, target) {
                const current = parseInt(element.textContent) || 0;
                if (current === target) return;
                const diff = target - current;
                const steps = Math.min(Math.abs(diff), 20);
                const increment = diff / steps;
                let step = 0;
                const anim = setInterval(() => {
                    step++;
                    if (step >= steps) {
                        element.textContent = target;
                        clearInterval(anim);
                    } else {
                        element.textContent = Math.round(current + increment * step);
                    }
                }, 30);
            }
            // ==================== 渲染列表 ====================
            function getFilteredTricks() {
                if (currentFilter === 'all') return [...tricks];
                if (['mastered', 'practicing', 'untried'].includes(currentFilter)) {
                    return tricks.filter(t => t.status === currentFilter);
                }
                // 按分类筛选
                return tricks.filter(t => t.category === currentFilter);
            }
            function renderTrickList() {
                const filtered = getFilteredTricks();
                if (filtered.length === 0) {
                    trickListContainer.innerHTML = `
                            <div class="empty-state">
                                <span class="emoji">🛹💨</span>
                                <p>${tricks.length === 0 ? '还没有记录任何技巧，<br>快添加你的第一个动作吧！' : '没有匹配的技巧，试试切换筛选条件。'}</p>
                            </div>`;
                    return;
                }
                // 按创建时间倒序排列（最新的在前）
                const sorted = [...filtered].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                trickListContainer.innerHTML = sorted.map(trick => {
                    const catConfig = CATEGORY_CONFIG[trick.category] || CATEGORY_CONFIG['other'];
                    const statusConfig = STATUS_CONFIG[trick.status];
                    const dateStr = new Date(trick.createdAt).toLocaleDateString('zh-CN', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                    });
                    return `
                            <div class="trick-card" data-id="${trick.id}">
                                <div class="trick-icon">${catConfig.icon}</div>
                                <div class="trick-info">
                                    <div class="trick-name">${escapeHTML(trick.name)}</div>
                                    <div class="trick-category">${catConfig.label}</div>
                                    <div class="trick-date">📅 ${dateStr}</div>
                                </div>
                                <span class="trick-status-badge ${statusConfig.badgeClass}" 
                                      data-action="cycle-status" 
                                      data-id="${trick.id}"
                                      title="点击切换状态：${statusConfig.label} → ${STATUS_CONFIG[statusConfig.next]?.label || '未尝试'}">
                                    ${statusConfig.icon} ${statusConfig.label}
                                </span>
                                <button class="btn-delete" 
                                        data-action="delete" 
                                        data-id="${trick.id}" 
                                        title="删除此技巧">×</button>
                            </div>`;
                }).join('');
                // 重新统计
                updateStats();
            }
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
            // ==================== 事件委托（列表内的点击） ====================
            trickListContainer.addEventListener('click', function(e) {
                const target = e.target.closest('[data-action]');
                if (!target) return;
                const action = target.getAttribute('data-action');
                const id = target.getAttribute('data-id');
                if (action === 'cycle-status') {
                    cycleTrickStatus(id);
                } else if (action === 'delete') {
                    deleteTrick(id);
                }
            });
            function cycleTrickStatus(id) {
                const trick = tricks.find(t => t.id === id);
                if (!trick) return;
                const oldStatus = trick.status;
                const newStatus = STATUS_CONFIG[oldStatus].next;
                trick.status = newStatus;
                saveToStorage();
                renderTrickList();
                updateFilterButtonStates();
                const statusConfig = STATUS_CONFIG[newStatus];
                showToast(`${STATUS_CONFIG[oldStatus].icon} → ${statusConfig.icon} "${trick.name}" 状态已更新为「${statusConfig.label}」`);
            }
            function deleteTrick(id) {
                const trick = tricks.find(t => t.id === id);
                if (!trick) return;
                const name = trick.name;
                // 简单确认（可自定义为更美观的模态框）
                if (confirm(`确定要删除技巧「${name}」吗？此操作不可恢复。`)) {
                    tricks = tricks.filter(t => t.id !== id);
                    saveToStorage();
                    renderTrickList();
                    updateFilterButtonStates();
                    showToast(`🗑️ 已删除「${name}」`);
                }
            }
            // ==================== 添加技巧 ====================
            function addTrick() {
                const name = trickNameInput.value.trim();
                const category = categorySelect.value;
                if (!name) {
                    showToast('⚠️ 请输入技巧名称');
                    trickNameInput.focus();
                    // 输入框抖动效果
                    trickNameInput.style.animation = 'none';
                    trickNameInput.offsetHeight; // reflow
                    trickNameInput.style.animation = 'shake 0.5s ease';
                    return;
                }
                // 检查重复
                const duplicate = tricks.some(
                    t => t.name.toLowerCase() === name.toLowerCase() && t.category === category
                );
                if (duplicate) {
                    showToast('⚠️ 该分类下已存在同名技巧');
                    trickNameInput.focus();
                    return;
                }
                const newTrick = {
                    id: generateId(),
                    name: name,
                    category: category,
                    status: 'untried',
                    createdAt: new Date().toISOString(),
                };
                tricks.push(newTrick);
                saveToStorage();
                trickNameInput.value = '';
                trickNameInput.focus();
                renderTrickList();
                updateFilterButtonStates();
                showToast(`🛹 已添加「${name}」到 ${CATEGORY_CONFIG[category]?.label || '其他'}！`);
            }
            // 输入框抖动动画
            const shakeKeyframes = `
                    @keyframes shake {
                        0%,100% { transform: translateX(0); }
                        20% { transform: translateX(-8px); }
                        40% { transform: translateX(8px); }
                        60% { transform: translateX(-6px); }
                        80% { transform: translateX(4px); }
                    }`;
            const shakeStyle = document.createElement('style');
            shakeStyle.textContent = shakeKeyframes;
            document.head.appendChild(shakeStyle);
            btnAddTrick.addEventListener('click', addTrick);
            trickNameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addTrick();
                }
            });
            // ==================== 清空全部 ====================
            btnResetAll.addEventListener('click', function() {
                if (tricks.length === 0) {
                    showToast('📭 记录表已经是空的');
                    return;
                }
                if (confirm(`确定要清空全部 ${tricks.length} 条技巧记录吗？此操作不可恢复！`)) {
                    tricks = [];
                    saveToStorage();
                    renderTrickList();
                    updateFilterButtonStates();
                    currentFilter = 'all';
                    updateFilterButtonStates();
                    showToast('🗑️ 已清空全部记录');
                }
            });
            // ==================== 筛选按钮 ====================
            function updateFilterButtonStates() {
                filterButtons.forEach(btn => {
                    const filterVal = btn.getAttribute('data-filter');
                    if (filterVal === currentFilter) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const filterVal = this.getAttribute('data-filter');
                    currentFilter = filterVal;
                    updateFilterButtonStates();
                    renderTrickList();
                    const label = this.textContent.trim();
                    showToast(`📋 筛选：${label}`);
                });
            });
            // ==================== 预设示例数据（首次使用） ====================
            function seedDemoDataIfEmpty() {
                if (tricks.length === 0 && !localStorage.getItem(STORAGE_KEY)) {
                    const demos = [
                        { name: 'Ollie', category: 'flatground', status: 'mastered' },
                        { name: 'Kickflip', category: 'flip', status: 'practicing' },
                        { name: 'Heelflip', category: 'flip', status: 'untried' },
                        { name: 'Boardslide', category: 'slide', status: 'practicing' },
                        { name: '50-50 Grind', category: 'grind', status: 'untried' },
                        { name: 'Pop Shove-it', category: 'flatground', status: 'mastered' },
                        { name: 'Tre Flip', category: 'flip', status: 'untried' },
                        { name: 'Nose Manual', category: 'manual', status: 'practicing' },
                        { name: 'Indy Grab', category: 'grab', status: 'untried' },
                        { name: 'Rock to Fakie', category: 'ramp', status: 'untried' },
                    ];
                    const now = Date.now();
                    tricks = demos.map((d, i) => ({
                        id: 'demo_' + i + '_' + Math.random().toString(36).slice(2, 6),
                        name: d.name,
                        category: d.category,
                        status: d.status,
                        createdAt: new Date(now - (demos.length - i) * 86400000 * 3).toISOString(),
                    }));
                    saveToStorage();
                }
            }
            // ==================== 初始化 ====================
            function init() {
                loadFromStorage();
                seedDemoDataIfEmpty();
                currentFilter = 'all';
                updateFilterButtonStates();
                renderTrickList();
                updateStats();
                trickNameInput.focus();
            }
            // ==================== 键盘快捷键 ====================
            document.addEventListener('keydown', function(e) {
                // Ctrl+Shift+A 聚焦到输入框
                if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                    e.preventDefault();
                    trickNameInput.focus();
                    trickNameInput.select();
                }
                // Escape 清除筛选
                if (e.key === 'Escape' && currentFilter !== 'all') {
                    currentFilter = 'all';
                    updateFilterButtonStates();
                    renderTrickList();
                    showToast('📋 已显示全部技巧');
                }
            });
            // ==================== 启动应用 ====================
            init();
            console.log('🛹 滑板技巧记录表已就绪！');
            console.log('   快捷键：Ctrl+Shift+A 聚焦输入框 | Esc 清除筛选');
            console.log('   点击状态徽章可循环切换：未尝试 → 练习中 → 已掌握 → 未尝试');
            console.log('   数据保存在浏览器 localStorage 中');
        })();
    </script>
</body>
</html>
