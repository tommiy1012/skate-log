<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛹 滑板学习记录表 - 碗池 & 街市动作</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-secondary: #6b5e4a;
            --accent: #e8753c;
            --accent2: #e8a040;
            --street: #5b7bb5;
            --street-light: #e8eff8;
            --street-dark: #3d5a8c;
            --bowl: #4a9c7c;
            --bowl-light: #e6f5ef;
            --bowl-dark: #2d7a5f;
            --star: #f0b429;
            --danger: #d64545;
            --success: #3d9c6e;
            --border: #e8e0d5;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 16px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(232, 160, 64, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(74, 156, 124, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(91, 123, 181, 0.03) 0%, transparent 70%);
        }
        /* ========== HEADER ========== */
        .app-header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }
        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .app-logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            text-decoration: none;
        }
        .app-logo .icon {
            font-size: 1.8rem;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-3px);
            }
            85% {
                transform: translateY(0);
            }
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn {
            padding: 9px 18px;
            border-radius: 50px;
            border: 1.5px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            font-family: var(--font);
            letter-spacing: 0.01em;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-sm {
            padding: 6px 13px;
            font-size: 0.82rem;
            border-radius: 50px;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 50px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(232, 117, 60, 0.25);
        }
        .btn-primary:hover {
            background: #d46935;
            border-color: #d46935;
            box-shadow: 0 4px 14px rgba(232, 117, 60, 0.35);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(232, 117, 60, 0.2);
        }
        .btn-outline {
            background: transparent;
            border-color: var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: #faf7f3;
            border-color: #d5c9b5;
            color: var(--text);
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text-secondary);
            padding: 8px 10px;
        }
        .btn-ghost:hover {
            background: #f5f0eb;
            color: var(--text);
        }
        .btn-danger {
            background: #fff;
            border-color: #fcc;
            color: var(--danger);
        }
        .btn-danger:hover {
            background: #fff5f5;
            border-color: #faa;
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }
        .btn-success:hover {
            background: #348b5f;
        }
        /* ========== MAIN CONTENT ========== */
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 20px;
        }
        /* ========== TABS ========== */
        .tab-nav {
            display: flex;
            gap: 4px;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 5px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            flex: 1;
            min-width: 90px;
            padding: 11px 18px;
            border: none;
            background: transparent;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            font-family: var(--font);
            color: var(--text-secondary);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }
        .tab-btn.active {
            background: #fff;
            color: var(--text);
            box-shadow: var(--shadow-sm);
            font-weight: 700;
        }
        .tab-btn:hover:not(.active) {
            color: var(--text);
            background: rgba(255, 255, 255, 0.5);
        }
        .tab-content {
            display: none;
            animation: fadeSlideIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* ========== SECTION CARDS ========== */
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }
        .section-title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-bowl {
            background: var(--bowl);
        }
        .dot-street {
            background: var(--street);
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            box-shadow: var(--shadow);
            border-color: #e8e0d5;
            transform: translateY(-1px);
        }
        .card:active {
            transform: scale(0.985);
            transition: 0.1s ease;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card-title {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .difficulty-stars {
            color: var(--star);
            font-size: 0.85rem;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .difficulty-stars .empty {
            color: #ddd;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .badge-bowl {
            background: var(--bowl-light);
            color: var(--bowl-dark);
        }
        .badge-street {
            background: var(--street-light);
            color: var(--street-dark);
        }
        .badge-status {
            font-size: 0.7rem;
            padding: 3px 9px;
        }
        .badge-new {
            background: #fef3e0;
            color: #b8781a;
        }
        .badge-practice {
            background: #e8f0fe;
            color: #3d6db5;
        }
        .badge-mastered {
            background: #e6f5ef;
            color: #2d7a5f;
        }
        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--card-bg);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 700px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 24px 20px 30px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            position: relative;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #d5c9b5;
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f5f0eb;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 5;
        }
        .modal-close:hover {
            background: #e8e0d5;
        }
        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }
        .modal .meta-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }
        .modal .section-label {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin: 16px 0 6px;
        }
        .modal .要领-text {
            background: #faf7f3;
            border-radius: var(--radius-sm);
            padding: 16px;
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-line;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #1a1a1a;
            margin-top: 8px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-placeholder {
            background: #faf7f3;
            border-radius: var(--radius-sm);
            padding: 30px 20px;
            text-align: center;
            color: var(--text-secondary);
            border: 2px dashed #e8e0d5;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .input {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            font-family: var(--font);
            background: #fdfbf8;
            transition: var(--transition);
            outline: none;
        }
        .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 117, 60, 0.08);
            background: #fff;
        }
        textarea.input {
            border-radius: var(--radius-sm);
            resize: vertical;
            min-height: 60px;
        }
        /* ========== LOG LIST ========== */
        .log-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid transparent;
            transition: var(--transition);
        }
        .log-item.bowl-log {
            border-left-color: var(--bowl);
        }
        .log-item.street-log {
            border-left-color: var(--street);
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }
        .log-date {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
        }
        .log-trick {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .log-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .log-detail {
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .log-detail strong {
            color: var(--text);
        }
        .log-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }
        /* ========== STATS ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500;
        }
        .progress-bar-wrap {
            background: #f0ebe0;
            border-radius: 50px;
            height: 8px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 50px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 0.5s ease;
        }
        /* ========== SEARCH/FILTER ========== */
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            align-items: center;
        }
        .filter-row select,
        .filter-row input {
            padding: 8px 14px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-size: 0.85rem;
            font-family: var(--font);
            background: #fdfbf8;
            outline: none;
            transition: var(--transition);
        }
        .filter-row select:focus,
        .filter-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 117, 60, 0.06);
        }
        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .app-header {
                padding: 10px 14px;
            }
            .app-logo {
                font-size: 1.2rem;
            }
            .app-logo .icon {
                font-size: 1.4rem;
            }
            .main-container {
                padding: 10px 12px;
            }
            .card {
                padding: 14px 16px;
            }
            .tab-btn {
                padding: 9px 12px;
                font-size: 0.8rem;
                min-width: 70px;
            }
            .btn {
                padding: 7px 14px;
                font-size: 0.82rem;
            }
            .modal {
                border-radius: 18px 18px 0 0;
                padding: 18px 14px 24px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .stat-value {
                font-size: 1.5rem;
            }
        }
        @media (min-width: 768px) {
            .modal-overlay {
                align-items: center;
            }
            .modal {
                border-radius: 20px;
                max-height: 85vh;
                margin: 0 20px;
            }
            .modal-handle {
                display: none;
            }
        }
        /* ========== PRINT ========== */
        @media print {
            body {
                background: #fff;
                padding-bottom: 0;
            }
            .app-header,
            .tab-nav,
            .btn,
            .modal-overlay,
            .filter-row,
            .log-actions,
            .header-actions,
            .modal-close,
            .modal-handle,
            .video-container,
            .video-placeholder,
            .input-group {
                display: none !important;
            }
            .tab-content {
                display: block !important;
                page-break-inside: avoid;
            }
            .card,
            .log-item {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
            .main-container {
                max-width: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="app-header">
        <div class="header-inner">
            <div class="app-logo">
                <span class="icon">🛹</span> 滑板学习记录
            </div>
            <div class="header-actions">
                <button class="btn btn-outline btn-sm" onclick="exportData()" title="导出备份">📥 备份</button>
                <button class="btn btn-outline btn-sm" onclick="importDataPrompt()" title="导入备份">📤 恢复</button>
                <input type="file" id="importFileInput" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </header>
    <!-- ==================== MAIN ==================== -->
    <div class="main-container">
        <!-- TABS -->
        <nav class="tab-nav" id="tabNav">
            <button class="tab-btn active" data-tab="tab-list">📋 动作清单</button>
            <button class="tab-btn" data-tab="tab-log">✅ 打卡记录</button>
            <button class="tab-btn" data-tab="tab-stats">📊 统计</button>
        </nav>
        <!-- TAB: 动作清单 -->
        <div class="tab-content active" id="tab-list">
            <div id="trickListContainer"></div>
        </div>
        <!-- TAB: 打卡记录 -->
        <div class="tab-content" id="tab-log">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
                <h2 style="font-size:1.2rem;font-weight:700;">✅ 打卡记录</h2>
                <button class="btn btn-primary btn-sm" onclick="openAddLogModal()">➕ 新增记录</button>
            </div>
            <div class="filter-row">
                <select id="logFilterTrick" onchange="renderLogs()">
                    <option value="all">全部动作</option>
                </select>
                <select id="logFilterCategory" onchange="renderLogs()">
                    <option value="all">全部分类</option>
                    <option value="bowl">碗池</option>
                    <option value="street">街市</option>
                </select>
                <input type="date" id="logFilterDate" onchange="renderLogs()" style="max-width:150px;" title="按日期筛选">
                <button class="btn btn-ghost btn-xs" onclick="clearLogFilters()">清除筛选</button>
            </div>
            <div id="logListContainer"></div>
        </div>
        <!-- TAB: 统计 -->
        <div class="tab-content" id="tab-stats">
            <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:14px;">📊 练习统计</h2>
            <div class="stats-grid" id="statsGrid"></div>
            <div id="statsDetailContainer"></div>
        </div>
    </div>
    <!-- ==================== MODAL OVERLAY ==================== -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModalOutside(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalInner"></div>
        </div>
    </div>
    <script>
        // ==================== DATA ====================
        // 动作清单数据
        const tricksData = {
            bowl: {
                name: '碗池动作',
                icon: '🏊',
                dotClass: 'dot-bowl',
                badgeClass: 'badge-bowl',
                levels: [{
                    level: '初级',
                    stars: 1,
                    tricks: [

        // 存储键
        const STORAGE_KEY_LOGS = 'skateboard_practice_logs';
        const STORAGE_KEY_VIDEOS = 'skateboard_trick_videos';
        const STORAGE_KEY_STATUS = 'skateboard_trick_status';
        // 加载数据
        function loadLogs() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY_LOGS)) || [];
            } catch (e) { return []; }
        }
        function saveLogs(logs) {
            localStorage.setItem(STORAGE_KEY_LOGS, JSON.stringify(logs));
        }
        function loadVideos() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY_VIDEOS)) || {};
            } catch (e) { return {}; }
        }
        function saveVideos(videos) {
            localStorage.setItem(STORAGE_KEY_VIDEOS, JSON.stringify(videos));
        }
        function loadStatuses() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY_STATUS)) || {};
            } catch (e) { return {}; }
        }
        function saveStatuses(statuses) {
            localStorage.setItem(STORAGE_KEY_STATUS, JSON.stringify(statuses));
        }
        // 获取所有动作的扁平列表
        function getAllTricks() {
            const all = [];
            for (const cat of ['bowl', 'street']) {
                for (const level of tricksData[cat].levels) {
                    for (const trick of level.tricks) {
                        all.push({ ...trick, category: cat, level: level.level, stars: level.stars });
                    }
                }
            }
            return all;
        }
        function getTrickById(id) {
            return getAllTricks().find(t => t.id === id);
        }

                <div class="section-title">

        function getEmbedUrl(url) {

            // B站

            if (match) return `//player.bilibili.com/player.html?bvid=${match[1]}&page=1`;
            // B站短链接
            match = url.match(/b23\.tv\/([a-zA-Z0-9]+)/);
            if (match) return null; // 短链接需要解析，暂返回null让用户用完整链接

        // ==================== RENDER: 统计 ====================
        function renderStats() {
            const logs = loadLogs();
            const statuses = loadStatuses();
            const allTricks = getAllTricks();
            const grid = document.getElementById('statsGrid');
            const detailContainer = document.getElementById('statsDetailContainer');
            const totalAttempts = logs.reduce((sum, l) => sum + (l.attempts || 0), 0);
            const totalLogs = logs.length;
            const uniqueTricksPracticed = new Set(logs.map(l => l.trickId)).size;
            const totalTricks = allTricks.length;
            const masteredCount = Object.values(statuses).filter(s => s === 'mastered').length;
            const practiceCount = Object.values(statuses).filter(s => s === 'practice').length;
            const progressPercent = totalTricks > 0 ? Math.round((masteredCount / totalTricks) * 100) : 0;
            // 连续打卡天数
            const dates = [...new Set(logs.map(l => l.date))].sort((a, b) => new Date(b) - new Date(a));
            let streak = 0;
            if (dates.length > 0) {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const checkDate = new Date(dates[0]);
                checkDate.setHours(0, 0, 0, 0);
                if (checkDate.getTime() === today.getTime() || checkDate.getTime() === yesterday.getTime()) {
                    streak = 1;
                    for (let i = 1; i < dates.length; i++) {
                        const d1 = new Date(dates[i - 1]);
                        const d2 = new Date(dates[i]);
                        d1.setHours(0, 0, 0, 0);
                        d2.setHours(0, 0, 0, 0);
                        const diff = (d1.getTime() - d2.getTime()) / (1000 * 60 * 60 * 24);
                        if (diff === 1) streak++;
                        else break;
                    }
                }
            }
            grid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalLogs}</div>
                    <div class="stat-label">总打卡次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalAttempts}</div>
                    <div class="stat-label">总练习次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueTricksPracticed}/${totalTricks}</div>
                    <div class="stat-label">练习动作数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">🔥 ${streak}</div>
                    <div class="stat-label">连续打卡天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:var(--success);">${masteredCount}</div>
                    <div class="stat-label">已掌握动作</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${progressPercent}%</div>
                    <div class="stat-label">掌握进度</div>
                    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progressPercent}%;"></div></div>
                </div>
            `;
            // 每个动作的练习统计
            const trickStats = {};
            for (const log of logs) {
                if (!trickStats[log.trickId]) {
                    trickStats[log.trickId] = { count: 0, totalAttempts: 0, lastDate: log.date };
                }
                trickStats[log.trickId].count++;
                trickStats[log.trickId].totalAttempts += (log.attempts || 0);
                if (log.date > trickStats[log.trickId].lastDate) {
                    trickStats[log.trickId].lastDate = log.date;
                }
            }
            const sortedTricks = Object.entries(trickStats)
                .sort((a, b) => b[1].totalAttempts - a[1].totalAttempts)
                .slice(0, 15);
            if (sortedTricks.length > 0) {
                let detailHtml =
                    '<h3 style="font-size:1rem;font-weight:700;margin:16px 0 10px;">🏆 练习最多的动作（按总次数排序）</h3>';
                for (const [trickId, stats] of sortedTricks) {
                    const trick = getTrickById(trickId);
                    const name = trick ? trick.name : trickId;
                    const catLabel = (trick && trick.category === 'bowl') ? '碗池' : '街市';
                    const status = statuses[trickId] || 'new';
                    const statusEmoji = status === 'mastered' ? '✅' : status === 'practice' ? '🔄' : '⬜';
                    detailHtml += `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#faf7f3;border-radius:8px;margin-bottom:6px;flex-wrap:wrap;gap:6px;">
                        <span>${statusEmoji} <strong>${name}</strong> <span style="font-size:0.75rem;color:var(--text-secondary);">[${catLabel}]</span></span>
                        <span style="font-size:0.85rem;">📅 ${stats.lastDate} | 练习 <strong>${stats.totalAttempts}</strong> 次 | 打卡 ${stats.count} 天</span>
                    </div>`;
                }
                detailContainer.innerHTML = detailHtml;
            } else {
                detailContainer.innerHTML =
                    '<div class="empty-state"><span class="emoji">📊</span><p>开始打卡后这里会显示统计数据</p></div>';
            }
        }

            a.href = url;

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm('导入数据将覆盖现有记录，确定继续吗？')) {
                event.target.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.logs && Array.isArray(data.logs)) {
                        saveLogs(data.logs);
                    }
                    if (data.videos && typeof data.videos === 'object') {
                        saveVideos(data.videos);
                    }
                    if (data.statuses && typeof data.statuses === 'object') {
                        saveStatuses(data.statuses);
                    }
                    alert('✅ 数据导入成功！');
                    renderAll();
                } catch (err) {
                    alert('❌ 文件格式错误，请检查文件');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const btn = document.querySelector(`[data-tab="${tabName}"]`);
            const content = document.getElementById(tabName);
            if (btn) btn.classList.add('active');
            if (content) content.classList.add('active');
            if (tabName === 'tab-log') renderLogs();
            if (tabName === 'tab-stats') renderStats();
            if (tabName === 'tab-list') renderTrickList();
        }
        // ==================== 键盘事件 ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const overlay = document.getElementById('modalOverlay');
                if (overlay.style.display === 'flex') {
                    closeModal();
                }
            }
        });
        // ==================== 初始化 ====================
        function renderAll() {
            renderTrickList();
            renderLogs();
            renderStats();
        }
        function init() {
            // Tab点击事件
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });
            // 初始渲染
            renderAll();
            // 如果没有日志，添加一些示例数据引导
            const logs = loadLogs();
            if (logs.length === 0) {
                const sampleLogs = [{
                    id: 'sample_1',
                    date: new Date(Date.now() - 3 * 86400000).toISOString().split('T')[0],

                    notes: '第一次练习，感觉有进步空间',
                    createdAt: Date.now() - 3 * 86400000
                }, {
                    id: 'sample_2',
                    date: new Date(Date.now() - 1 * 86400000).toISOString().split('T')[0],
                    trickId: 'street_ollie',
                    attempts: 80,

                    corrections: '后脚pop更有力了，前脚刷板时机需要更早一点',
                    notes: '比上次好多了！',

                }, {

                    corrections: '教练说重心要前倾，眼睛看碗底',

                }];
                saveLogs(sampleLogs);
                // 设置示例状态
                saveStatuses({ 'street_ollie': 'practice', 'bowl_dropping_in': 'practice' });
                renderAll();
            }
        }
        init();
